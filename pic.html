<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mobile frame</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html,
    body {
      margin: 0;
      height: 100%;
      min-height: 100dvh;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: #6b7280;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .device {
      position: relative;
      width: min(320px, 86vw);
      height: min(640px, 86dvh);
      border-radius: 36px;
      background: #0f0f0f;
      padding: 10px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.06) inset,
        0 24px 48px rgba(0, 0, 0, 0.35);
    }
    .device__notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 26px;
      border-radius: 0 0 16px 16px;
      background: #0f0f0f;
      z-index: 2;
    }
    .device__screen {
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background: #fafafa;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="device" role="img" aria-label="Empty mobile phone frame">
    <div class="device__notch" aria-hidden="true"></div>
    <div class="device__screen"></div>
  </div>
</body>
</html>
